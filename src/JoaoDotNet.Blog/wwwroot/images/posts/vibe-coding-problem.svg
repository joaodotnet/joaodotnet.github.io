<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 550" width="100%" height="100%">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d0d12"/>
      <stop offset="100%" stop-color="#1a1a24"/>
    </linearGradient>
    <linearGradient id="redGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fa5252"/>
      <stop offset="100%" stop-color="#c22525"/>
    </linearGradient>
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#339af0"/>
      <stop offset="100%" stop-color="#1c7ed6"/>
    </linearGradient>
    <linearGradient id="orangeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff922b"/>
      <stop offset="100%" stop-color="#f56e0f"/>
    </linearGradient>
    
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6c6c8c" />
    </marker>
  </defs>
  
  <rect width="100%" height="100%" fill="url(#bg)" rx="10"/>

  <!-- Grid overlay -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  </pattern>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <!-- Arrows from Vague Prompt to AI Generates Code -->
  <line x1="500" y1="100" x2="500" y2="140" stroke="#6c6c8c" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Arrows from AI Generates Code to Problems -->
  <path d="M 500,220 L 107,280" stroke="#6c6c8c" stroke-dasharray="3,3" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M 500,220 L 262,280" stroke="#6c6c8c" stroke-dasharray="3,3" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M 500,220 L 417,280" stroke="#6c6c8c" stroke-dasharray="3,3" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M 500,220 L 572,280" stroke="#6c6c8c" stroke-dasharray="3,3" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M 500,220 L 728,280" stroke="#6c6c8c" stroke-dasharray="3,3" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M 500,220 L 883,280" stroke="#6c6c8c" stroke-dasharray="3,3" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Arrows from Problems to Result -->
  <path d="M 107,360 L 500,420" stroke="#6c6c8c" stroke-dasharray="3,3" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M 262,360 L 500,420" stroke="#6c6c8c" stroke-dasharray="3,3" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M 417,360 L 500,420" stroke="#6c6c8c" stroke-dasharray="3,3" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M 572,360 L 500,420" stroke="#6c6c8c" stroke-dasharray="3,3" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M 728,360 L 500,420" stroke="#6c6c8c" stroke-dasharray="3,3" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M 883,360 L 500,420" stroke="#6c6c8c" stroke-dasharray="3,3" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Nodes -->
  <!-- Vague Prompt -->
  <rect x="400" y="40" width="200" height="60" rx="8" fill="#1e1e2e" stroke="#ff6b6b" stroke-width="2"/>
  <text x="500" y="75" fill="#fff" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">Vague Prompt</text>

  <!-- AI Generates Code -->
  <rect x="370" y="150" width="260" height="70" rx="8" fill="url(#blueGradient)" stroke="#fff" stroke-width="2"/>
  <text x="500" y="190" fill="#fff" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">AI Generates Code</text>

  <!-- Problems -->
  <!-- 1. Ambiguous Requirements -->
  <rect x="40" y="290" width="135" height="70" rx="8" fill="#1e1e2e" stroke="#fa5252" stroke-width="1.5"/>
  <text x="107" y="322" fill="#ffc9c9" font-family="sans-serif" font-size="12" text-anchor="middle">Ambiguous</text>
  <text x="107" y="338" fill="#ffc9c9" font-family="sans-serif" font-size="12" text-anchor="middle">Requirements</text>

  <!-- 2. Missing Edge Cases -->
  <rect x="195" y="290" width="135" height="70" rx="8" fill="#1e1e2e" stroke="#fa5252" stroke-width="1.5"/>
  <text x="262" y="322" fill="#ffc9c9" font-family="sans-serif" font-size="12" text-anchor="middle">Missing</text>
  <text x="262" y="338" fill="#ffc9c9" font-family="sans-serif" font-size="12" text-anchor="middle">Edge Cases</text>

  <!-- 3. Hidden Assumptions -->
  <rect x="350" y="290" width="135" height="70" rx="8" fill="#1e1e2e" stroke="#fa5252" stroke-width="1.5"/>
  <text x="417" y="322" fill="#ffc9c9" font-family="sans-serif" font-size="12" text-anchor="middle">Hidden</text>
  <text x="417" y="338" fill="#ffc9c9" font-family="sans-serif" font-size="12" text-anchor="middle">Assumptions</text>

  <!-- 4. Architecture Drift -->
  <rect x="505" y="290" width="135" height="70" rx="8" fill="#1e1e2e" stroke="#fa5252" stroke-width="1.5"/>
  <text x="572" y="322" fill="#ffc9c9" font-family="sans-serif" font-size="12" text-anchor="middle">Architecture</text>
  <text x="572" y="338" fill="#ffc9c9" font-family="sans-serif" font-size="12" text-anchor="middle">Drift</text>

  <!-- 5. Documentation Drift -->
  <rect x="660" y="290" width="135" height="70" rx="8" fill="#1e1e2e" stroke="#fa5252" stroke-width="1.5"/>
  <text x="728" y="322" fill="#ffc9c9" font-family="sans-serif" font-size="12" text-anchor="middle">Documentation</text>
  <text x="728" y="338" fill="#ffc9c9" font-family="sans-serif" font-size="12" text-anchor="middle">Drift</text>

  <!-- 6. Stakeholder Rework -->
  <rect x="815" y="290" width="135" height="70" rx="8" fill="#1e1e2e" stroke="#fa5252" stroke-width="1.5"/>
  <text x="882" y="322" fill="#ffc9c9" font-family="sans-serif" font-size="12" text-anchor="middle">Stakeholder</text>
  <text x="882" y="338" fill="#ffc9c9" font-family="sans-serif" font-size="12" text-anchor="middle">Rework</text>

  <!-- Result -->
  <rect x="300" y="430" width="400" height="60" rx="8" fill="url(#orangeGradient)" stroke="#fff" stroke-width="2"/>
  <text x="500" y="465" fill="#fff" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">❌ Unpredictable, hard-to-review output</text>
</svg>