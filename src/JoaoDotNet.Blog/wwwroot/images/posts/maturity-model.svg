<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="100%" height="100%">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d0d12"/>
      <stop offset="100%" stop-color="#1a1a24"/>
    </linearGradient>
    <linearGradient id="greenGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#40c057"/>
      <stop offset="100%" stop-color="#2b8a3e"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6c6c8c" />
    </marker>
  </defs>
  
  <rect width="100%" height="100%" fill="url(#bg)" rx="10"/>

  <!-- Grid overlay -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  </pattern>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <!-- Connection arrows (vertical step connectors) -->
  <line x1="330" y1="400" x2="330" y2="385" stroke="#6c6c8c" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="440" y1="320" x2="440" y2="305" stroke="#6c6c8c" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="550" y1="240" x2="550" y2="225" stroke="#6c6c8c" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="660" y1="160" x2="660" y2="145" stroke="#6c6c8c" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Stairs -->
  <!-- Level 1 -->
  <rect x="50" y="400" width="340" height="60" rx="8" fill="#1e1e2e" stroke="#ff6b6b" stroke-width="1.5"/>
  <text x="220" y="425" fill="#fff" font-family="sans-serif" font-size="13" font-weight="bold" text-anchor="middle">Level 1: Ad-hoc Prompting</text>
  <text x="220" y="443" fill="#ffc9c9" font-family="sans-serif" font-size="11" text-anchor="middle">(Vibe coding, freestyle generation)</text>

  <!-- Level 2 -->
  <rect x="160" y="320" width="340" height="60" rx="8" fill="#1e1e2e" stroke="#fd7e14" stroke-width="1.5"/>
  <text x="330" y="345" fill="#fff" font-family="sans-serif" font-size="13" font-weight="bold" text-anchor="middle">Level 2: Prompt + Shared Instructions</text>
  <text x="330" y="363" fill="#ffe8cc" font-family="sans-serif" font-size="11" text-anchor="middle">(System instructions and custom workspace rules)</text>

  <!-- Level 3 -->
  <rect x="270" y="240" width="340" height="60" rx="8" fill="#1e1e2e" stroke="#fcc419" stroke-width="1.5"/>
  <text x="440" y="265" fill="#fff" font-family="sans-serif" font-size="13" font-weight="bold" text-anchor="middle">Level 3: Spec-first for Med/Large Features</text>
  <text x="440" y="283" fill="#fff3bf" font-family="sans-serif" font-size="11" text-anchor="middle">(Targeted usage where ambiguity is high)</text>

  <!-- Level 4 -->
  <rect x="380" y="160" width="340" height="60" rx="8" fill="#1e1e2e" stroke="#51cf66" stroke-width="1.5"/>
  <text x="550" y="185" fill="#fff" font-family="sans-serif" font-size="13" font-weight="bold" text-anchor="middle">Level 4: Constitution + Templates + Review</text>
  <text x="550" y="203" fill="#d8f5a2" font-family="sans-serif" font-size="11" text-anchor="middle">(Project-level guardrails and manual verification)</text>

  <!-- Level 5 -->
  <rect x="490" y="80" width="340" height="60" rx="8" fill="url(#greenGradient)" stroke="#fff" stroke-width="2"/>
  <text x="660" y="105" fill="#fff" font-family="sans-serif" font-size="13" font-weight="bold" text-anchor="middle">Level 5: Team-wide SDD Workflow</text>
  <text x="660" y="123" fill="#fff" font-family="sans-serif" font-size="11" text-anchor="middle">(Fully integrated into CI/CD and SDLC)</text>
</svg>