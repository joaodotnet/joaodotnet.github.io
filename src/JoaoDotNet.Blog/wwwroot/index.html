<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JoaoDotNet Blog</title>
    <base href="/" />
    <link rel="preload" id="webassembly" />
    <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="JoaoDotNet.Blog.styles.css" rel="stylesheet" />
    <script type="importmap"></script>
    <script defer src="https://cloud.umami.is/script.js" data-website-id="0963d936-aeda-4727-8bef-11e75a25a00e"></script>
    <script>
        (function () {
            const params = new URLSearchParams(window.location.search);
            const paramLang = params.get("lang");
            if (paramLang) {
                const normalized = paramLang.startsWith("pt") ? "pt-PT" : "en";
                localStorage.setItem("locale", normalized);
            }

            const stored = localStorage.getItem("locale") || "pt-PT";
            document.documentElement.lang = stored.startsWith("pt") ? "pt" : "en";

            window.cultureManager = {
                getCulture: (key, fallback) => localStorage.getItem(key) || fallback,
                setCulture: (key, value) => {
                    localStorage.setItem(key, value);
                    document.documentElement.lang = value.startsWith("pt") ? "pt" : "en";
                }
            };
        })();
    </script>
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <noscript>
        <div class="noscript">
            <p>Este site precisa de JavaScript para apresentar o conteúdo.</p>
            <p>This site needs JavaScript to render the content.</p>
        </div>
    </noscript>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script>
        (function () {
            const params = new URLSearchParams(window.location.search);
            const path = params.get("path");
            const search = params.get("search") || "";
            const hash = params.get("hash") || "";
            if (path) {
                history.replaceState(null, "", path + search + hash);
            }
        })();
    </script>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
</body>

</html>
